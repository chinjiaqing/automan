packages:
  - 'server'
  - 'shared'
  - 'web'
  - 'desktop'
# pnpm 11：构建脚本白名单使用 allowBuilds 布尔映射（这是 11.x 实际生效的键）
allowBuilds:
  '@u4/opencv4nodejs': true
  better-sqlite3: true
  electron: true
  electron-winstaller: true
  esbuild: true
  vue-demi: true
  winax: true
# pnpm 10 兼容：onlyBuiltDependencies 数组格式（旧版本仍读取此键）
onlyBuiltDependencies:
  - '@u4/opencv4nodejs'
  - better-sqlite3
  - electron
  - electron-winstaller
  - esbuild
  - vue-demi
  - winax
