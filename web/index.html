<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Automan — WebSocket 测试面板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }

    h1 { font-size: 1.5rem; margin-bottom: 4px; color: #60a5fa; }
    .subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 24px; }

    .grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 24px;
      height: calc(100vh - 100px);
    }

    /* ── 左栏 ── */
    .panel {
      background: #1e2130;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border: 1px solid #2d3148;
    }

    .panel h2 { font-size: 1rem; color: #94a3b8; letter-spacing: 0.05em; text-transform: uppercase; }

    .conn-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      transition: background 0.3s;
    }
    .dot.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e; }

    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-size: 0.8rem; color: #64748b; }

    input[type="text"] {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      transition: border 0.2s;
    }
    input[type="text"]:focus { border-color: #60a5fa; }

    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 9px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-weight: 500;
    }
    button:hover { background: #1d4ed8; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #374151; cursor: not-allowed; color: #6b7280; }

    button.secondary { background: #374151; }
    button.secondary:hover { background: #4b5563; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    button.success { background: #16a34a; }
    button.success:hover { background: #15803d; }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-row button { flex: 1; min-width: 0; }

    .divider { border: none; border-top: 1px solid #2d3148; margin: 4px 0; }

    .section-title { font-size: 0.8rem; color: #475569; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }

    /* ── 右栏 ── */
    .right-panel {
      background: #1e2130;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      border: 1px solid #2d3148;
    }

    .right-panel h2 { font-size: 1rem; color: #94a3b8; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 12px; }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .log-count {
      background: #2563eb;
      color: white;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
    }

    #log {
      flex: 1;
      overflow-y: auto;
      background: #0f1117;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      border: 1px solid #2d3148;
    }

    #log::-webkit-scrollbar { width: 6px; }
    #log::-webkit-scrollbar-track { background: #0f1117; border-radius: 3px; }
    #log::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }

    .log-entry { padding: 2px 0; border-bottom: 1px solid #1a1d2e; }
    .log-entry:last-child { border-bottom: none; }
    .log-time { color: #475569; }
    .log-type { font-weight: 600; }
    .log-type.recv { color: #60a5fa; }
    .log-type.send { color: #a78bfa; }
    .log-type.event { color: #34d399; }
    .log-type.error { color: #f87171; }
    .log-type.system { color: #fbbf24; }
    .log-payload { color: #94a3b8; }

    .clear-btn {
      background: transparent;
      border: 1px solid #374151;
      color: #6b7280;
      padding: 4px 10px;
      font-size: 0.75rem;
      border-radius: 4px;
    }
    .clear-btn:hover { border-color: #6b7280; color: #94a3b8; }

    select {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      width: 100%;
      cursor: pointer;
    }
    select:focus { border-color: #60a5fa; }
    select:disabled { opacity: 0.5; cursor: not-allowed; }
    option { background: #0f1117; color: #e2e8f0; }
  </style>
</head>
<body>

<h1>🤖 Automan WebSocket 测试面板</h1>
<p class="subtitle">实时监控 WebSocket 通信 · 测试任务调度</p>

<div class="grid">
  <!-- 左栏：控制面板 -->
  <div class="panel">

    <h2>连接控制</h2>

    <div class="conn-status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">未连接</span>
    </div>

    <div class="input-group">
      <label>服务器地址</label>
      <input type="text" id="wsUrl" value="ws://localhost:3000/ws" />
    </div>

    <div class="btn-row">
      <button id="connectBtn" onclick="connect()">连接</button>
      <button id="disconnectBtn" class="danger" onclick="disconnect()" disabled>断开</button>
    </div>

    <hr class="divider" />

    <h2>Ping / Pong</h2>
    <div class="btn-row">
      <button class="secondary" onclick="sendPing()">发送 Ping</button>
    </div>

    <hr class="divider" />

    <h2>任务控制</h2>

    <div class="input-group">
      <label>任务类型（taskType）</label>
      <input type="text" id="taskType" value="daily_quest" placeholder="如：daily_quest" />
    </div>

    <div class="input-group">
      <label>任务 ID（留空自动生成）</label>
      <input type="text" id="taskIdInput" placeholder="可选" />
    </div>

    <div class="btn-row">
      <button class="success" onclick="startTask()">启动任务</button>
      <button class="secondary" onclick="listTasks()">查询任务</button>
    </div>

    <div class="input-group">
      <label>停止指定任务（taskId）</label>
      <input type="text" id="stopTaskId" placeholder="输入 taskId" />
    </div>

    <button class="danger" onclick="stopTask()">停止任务</button>

    <hr class="divider" />

    <h2>Actor 消息</h2>

    <div class="input-group">
      <label>Actor ID</label>
      <input type="text" id="actorIdInput" placeholder="输入 actorId" />
    </div>

    <div class="input-group">
      <label>自定义 Payload（JSON）</label>
      <input type="text" id="actorPayload" placeholder='{"action":"hello"}' />
    </div>

    <button class="secondary" onclick="sendToActor()">发送到 Actor</button>

    <hr class="divider" />

    <h2>自定义消息</h2>
    <div class="input-group">
      <label>原始 JSON</label>
      <input type="text" id="rawMessage" placeholder='{"type":"custom","payload":{}}' />
    </div>
    <button class="secondary" onclick="sendRaw()">发送</button>

    <hr class="divider" />

    <h2>🎮 设备管理</h2>

    <div class="input-group">
      <label>ldconsole.exe 路径</label>
      <input type="text" id="ldPath" value="E:\leidian\LDPlayer9\ldconsole.exe" placeholder="如 D:\leidian9\ldconsole.exe" />
    </div>

    <button class="secondary" onclick="queryInstances()">🔍 查询可用实例</button>

    <div class="input-group">
      <label>选择实例（从查询结果中选择）</label>
      <select id="instanceSelect" disabled>
        <option value="">— 请先查询实例 —</option>
      </select>
    </div>

    <div class="input-group">
      <label>设备别名（可自定义）</label>
      <input type="text" id="devName" placeholder="选中实例后自动填充" />
    </div>

    <button class="success" onclick="bindDevice()">🔗 绑定选中实例</button>

    <hr class="divider" />

    <div class="input-group">
      <label>已绑定设备 ID（绑定后自动填入）</label>
      <input type="text" id="devId" placeholder="绑定后自动填入" />
    </div>

    <div class="btn-row">
      <button class="success" onclick="launchDevice()">启动</button>
      <button class="danger" onclick="quitDevice()">关闭</button>
      <button class="secondary" onclick="rebootDevice()">重启</button>
    </div>

    <div class="btn-row">
      <button class="secondary" onclick="refreshDevice()">刷新状态</button>
      <button class="danger" onclick="unbindDevice()">解绑</button>
    </div>

    <button class="secondary" onclick="listBoundDevices()">📗 查询已绑定设备</button>

    <hr class="divider" />

    <h2>📱 应用控制</h2>

    <div class="input-group">
      <label>应用包名（packageName）</label>
      <input type="text" id="pkgName" placeholder="如 com.example.game" />
    </div>

    <div class="btn-row">
      <button class="success" onclick="startApp()">启动应用</button>
      <button class="danger" onclick="stopApp()">关闭应用</button>
      <button class="secondary" onclick="restartApp()">重启应用</button>
    </div>

    <hr class="divider" />

    <h2>🖼️ 模拟器截屏</h2>

    <div class="btn-row">
      <button class="secondary" onclick="takeScreenshot()">📸 截取当前画面</button>
    </div>

    <div id="screenshotWrap" style="margin-top:12px;display:none;">
      <img id="screenshotImg" style="max-width:100%;border:1px solid #2d3148;border-radius:6px;" />
      <div id="screenshotInfo" style="font-size:0.8rem;color:#64748b;margin-top:4px;"></div>
    </div>

  </div>

  <!-- 右栏：日志 -->
  <div class="right-panel">
    <div class="log-header">
      <h2>通信日志</h2>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="log-count" id="logCount">0</span>
        <button class="clear-btn" onclick="clearLog()">清空</button>
      </div>
    </div>
    <div id="log"></div>
  </div>
</div>

<script>
  let ws = null
  let logCount = 0

  const $ = (id) => document.getElementById(id)

  function updateStatus(connected) {
    $('statusDot').classList.toggle('connected', connected)
    $('statusText').textContent = connected ? '已连接' : '未连接'
    $('connectBtn').disabled = connected
    $('disconnectBtn').disabled = !connected
  }

  function appendLog(type, label, payload) {
    const time = new Date().toLocaleTimeString('zh-CN', { hour12: false })
    const entry = document.createElement('div')
    entry.className = 'log-entry'
    entry.innerHTML =
      `<span class="log-time">${time}</span> ` +
      `<span class="log-type ${type}">[${label}]</span> ` +
      `<span class="log-payload">${payload}</span>`
    $('log').appendChild(entry)
    $('log').scrollTop = $('log').scrollHeight
    logCount++
    $('logCount').textContent = logCount
  }

  function clearLog() {
    $('log').innerHTML = ''
    logCount = 0
    $('logCount').textContent = 0
  }

  function connect() {
    const url = $('wsUrl').value.trim()
    if (!url) return
    try {
      ws = new WebSocket(url)

      ws.onopen = () => {
        updateStatus(true)
        appendLog('system', 'SYSTEM', `connected to ${url}`)
      }

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data)
          appendLog('recv', msg.type, JSON.stringify(msg.payload ?? ''))
        } catch {
          appendLog('recv', 'RAW', e.data)
        }
      }

      ws.onclose = (e) => {
        updateStatus(false)
        appendLog('system', 'SYSTEM', `connection closed (code: ${e.code})`)
      }

      ws.onerror = () => {
        appendLog('error', 'ERROR', 'WebSocket error occurred')
      }
    } catch (err) {
      appendLog('error', 'ERROR', err.message)
    }
  }

  function disconnect() {
    if (ws) { ws.close(); ws = null }
  }

  function send(obj) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      appendLog('error', 'ERROR', 'not connected')
      return
    }
    const msg = { ...obj, timestamp: Date.now() }
    ws.send(JSON.stringify(msg))
    appendLog('send', obj.type, JSON.stringify(obj.payload ?? ''))
  }

  function sendPing() {
    send({ type: 'ping' })
  }

  function startTask() {
    const taskType = $('taskType').value.trim() || 'default_task'
    const taskId = $('taskIdInput').value.trim() || undefined
    send({ type: 'task:start', payload: { taskType, taskId } })
  }

  function listTasks() {
    send({ type: 'task:list' })
  }

  function stopTask() {
    const taskId = $('stopTaskId').value.trim()
    if (!taskId) { appendLog('error', 'ERROR', 'please enter taskId'); return }
    send({ type: 'task:stop', payload: { taskId } })
  }

  function sendToActor() {
    const actorId = $('actorIdInput').value.trim()
    if (!actorId) { appendLog('error', 'ERROR', 'please enter actorId'); return }
    let extra = {}
    try { extra = JSON.parse($('actorPayload').value || '{}') } catch {}
    send({ type: 'actor:send', payload: { actorId, ...extra } })
  }

  function sendRaw() {
    const raw = $('rawMessage').value.trim()
    if (!raw) return
    try {
      const obj = JSON.parse(raw)
      send(obj)
    } catch {
      appendLog('error', 'ERROR', 'invalid JSON')
    }
  }

  // ── HTTP API 助手 ───────────────────────────
  const API = 'http://localhost:3000'

  async function api(method, path, body) {
    const opts = { method, headers: {} }
    if (body) {
      opts.headers['Content-Type'] = 'application/json'
      opts.body = JSON.stringify(body)
    }
    try {
      const res = await fetch(`${API}${path}`, opts)
      const data = await res.json()
      if (!res.ok) throw new Error(data.message || JSON.stringify(data))
      appendLog('event', `HTTP ${method}`, `${path} → ${JSON.stringify(data)}`)
      return data
    } catch (err) {
      appendLog('error', 'HTTP ERROR', `${method} ${path}: ${err.message}`)
      throw err
    }
  }

  // ── 设备管理函数 ─────────────────────────────

  /** 查询可用实例，填充下拉框 */
  async function queryInstances() {
    const ldconsolePath = $('ldPath').value.trim()
    if (!ldconsolePath) { appendLog('error', 'ERROR', '请填写 ldconsole 路径'); return }
    try {
      const data = await api('GET', `/api/devices?path=${encodeURIComponent(ldconsolePath)}`)
      const instances = data.instances || []
      const sel = $('instanceSelect')
      sel.innerHTML = ''
      if (instances.length === 0) {
        sel.innerHTML = '<option value="">未找到实例</option>'
        sel.disabled = true
        appendLog('event', 'INFO', '未找到任何模拟器实例')
        return
      }
      instances.forEach((inst) => {
        const opt = document.createElement('option')
        const status = inst.running ? '✅ 运行中' : '⬛ 已关闭'
        opt.value = JSON.stringify(inst)
        opt.textContent = `[${inst.index}] ${inst.name}  —  ${status}`
        sel.appendChild(opt)
      })
      sel.disabled = false
      const first = instances[0]
      if (first && !$('devName').value.trim()) {
        $('devName').value = first.name
      }
      appendLog('event', 'INFO', `找到 ${instances.length} 个实例，请在下拉框中选择`)
    } catch {}
  }

  /** 下拉框变化时自动填充别名 */
  document.addEventListener('DOMContentLoaded', () => {
    $('instanceSelect').addEventListener('change', function () {
      try {
        const inst = JSON.parse(this.value)
        $('devName').value = inst.name
      } catch {}
    })
  })

  /** 绑定选中实例 */
  async function bindDevice() {
    const selVal = $('instanceSelect').value
    if (!selVal) { appendLog('error', 'ERROR', '请先查询并选择实例'); return }
    let inst
    try { inst = JSON.parse(selVal) } catch { appendLog('error', 'ERROR', '下拉框数据异常'); return }
    const ldconsolePath = $('ldPath').value.trim()
    const name = $('devName').value.trim() || inst.name
    try {
      const data = await api('POST', '/api/devices/bind', {
        name,
        ldconsolePath,
        instanceIndex: inst.index,
      })
      $('devId').value = data.device.id
    } catch {}
  }

  /** 查询已绑定设备 */
  async function listBoundDevices() {
    await api('GET', '/api/devices')
  }

  async function launchDevice() {
    const id = $('devId').value.trim()
    if (!id) { appendLog('error', 'ERROR', '请先填写设备 ID'); return }
    await api('POST', `/api/devices/${id}/launch`)
  }

  async function quitDevice() {
    const id = $('devId').value.trim()
    if (!id) { appendLog('error', 'ERROR', '请先填写设备 ID'); return }
    await api('POST', `/api/devices/${id}/quit`)
  }

  async function rebootDevice() {
    const id = $('devId').value.trim()
    if (!id) { appendLog('error', 'ERROR', '请先填写设备 ID'); return }
    await api('POST', `/api/devices/${id}/reboot`)
  }

  async function refreshDevice() {
    const id = $('devId').value.trim()
    if (!id) { appendLog('error', 'ERROR', '请先填写设备 ID'); return }
    await api('POST', `/api/devices/${id}/refresh`)
  }

  async function unbindDevice() {
    const id = $('devId').value.trim()
    if (!id) { appendLog('error', 'ERROR', '请先填写设备 ID'); return }
    await api('DELETE', `/api/devices/${id}`)
    $('devId').value = ''
  }

  // ── 应用控制函数 ───────────────────────────

  function getDeviceIdAndPkg() {
    const id = $('devId').value.trim()
    const pkg = $('pkgName').value.trim()
    if (!id) { appendLog('error', 'ERROR', '请先填写设备 ID'); return null }
    if (!pkg) { appendLog('error', 'ERROR', '请填写应用包名'); return null }
    return { id, pkg }
  }

  async function startApp() {
    const r = getDeviceIdAndPkg()
    if (!r) return
    await api('POST', `/api/devices/${r.id}/app/start`, { packageName: r.pkg })
  }

  async function stopApp() {
    const r = getDeviceIdAndPkg()
    if (!r) return
    await api('POST', `/api/devices/${r.id}/app/stop`, { packageName: r.pkg })
  }

  async function restartApp() {
    const r = getDeviceIdAndPkg()
    if (!r) return
    await api('POST', `/api/devices/${r.id}/app/restart`, { packageName: r.pkg })
  }

  // ── 截屏函数 ────────────────────────────────

  async function takeScreenshot() {
    const id = $('devId').value.trim()
    if (!id) { appendLog('error', 'ERROR', '请先填写设备 ID'); return }
    try {
      const t0 = performance.now()
      const data = await api('POST', `/api/devices/${id}/screenshot`)
      const ms = Math.round(performance.now() - t0)
      const wrap = $('screenshotWrap')
      const img = $('screenshotImg')
      const info = $('screenshotInfo')
      img.src = data.screenshot
      wrap.style.display = 'block'
      // 估算图片大小（base64 长度 * 0.75 ≈ 字节数）
      const sizeKb = Math.round((data.screenshot.length * 0.75) / 1024)
      info.textContent = `${sizeKb} KB · ${ms}ms · ${new Date().toLocaleTimeString()}`
      appendLog('event', 'INFO', `截屏成功 (${sizeKb} KB, ${ms}ms)`)
    } catch {}
  }
</script>

</body>
</html>
